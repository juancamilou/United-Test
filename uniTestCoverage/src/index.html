<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ActiveGear | Premium Sportswear</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="main-header">
        <nav class="nav-container">
            <div class="logo">ACTIVE<span>GEAR</span></div>
            <ul class="nav-links">
                <li><a href="#productos">Catálogo</a></li>
                <li><a href="#">Hombres</a></li>
                <li><a href="#">Mujeres</a></li>
            </ul>
            <button class="cart-trigger" id="cart-open">
                <span class="cart-icon">🛒</span>
                <span id="cart-count" class="badge">0</span>
            </button>
        </nav>
    </header>

    <div id="cart-overlay" class="cart-overlay">
        <div class="cart-modal">
            <button id="cart-close" class="close-btn">&times;</button>
            <div class="cart-header">
                <h2>Tu Selección</h2>
            </div>
            
            <div id="cart-items" class="cart-body">
                </div>
            
            <div class="cart-footer-modal">
                <div class="total-row">
                    <span>Subtotal</span>
                    <span id="subtotal-amount">$0.00</span>
                </div>
                <div class="cart-actions">
                    <button id="btn-empty" class="btn-secondary">Vaciar Carrito</button>
                    <button class="btn-checkout">Finalizar Compra</button>
                </div>
            </div>
        </div>
    </div>

    <main class="container">
        <section class="hero" id="productos">
            <h1>EQUÍPATE PARA EL <span class="highlight">ÉXITO</span></h1>
            <p>Rendimiento sin límites con tecnología de élite.</p>
        </section>

        <nav class="filter-bar">
            <button class="filter-btn active" data-cat="TODO">Todos</button>
            <button class="filter-btn" data-cat="HOMBRES">Camisetas</button>
            <button class="filter-btn" data-cat="CALZADO">Zapatos</button>
            <button class="filter-btn" data-cat="UNISEX">Pantalonetas</button>
        </nav>

        <div id="product-grid" class="product-grid">
            </div>
    </main>

    <footer class="site-footer">
        <div class="footer-content">
            <div class="footer-logo">ACTIVE<span>GEAR</span></div>
            <p>© 2026 ActiveGear Colombia. Todos los derechos reservados.</p>
            <div class="social-links">
                <span>Instagram</span> • <span>Facebook</span> • <span>Twitter</span>
            </div>
        </div>
    </footer>

    <script src="index.js"></script>
</body>
</html>
